<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Watch Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: radial-gradient(circle at 20% 30%, #1a0033, #000 90%);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="8" cy="8" r="1" fill="rgba(255,200,200,0.1)"/><circle cx="32" cy="15" r="2" fill="rgba(200,100,255,0.1)"/></svg>');
            opacity: 0.4;
            animation: float 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes float {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-20px) translateX(5px); }
        }
        
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 51, 153, 0.15), transparent 70%);
            filter: blur(60px);
            z-index: 0;
            animation: orbMove 15s ease-in-out infinite alternate;
        }
        
        .orb1 {
            top: 5%;
            left: 0%;
            background: radial-gradient(circle at center, rgba(255, 100, 150, 0.2), transparent);
        }
        
        .orb2 {
            bottom: 5%;
            right: 0%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at center, rgba(170, 68, 255, 0.15), transparent);
            animation-duration: 25s;
        }
        
        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, -15px) scale(1.05); }
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }
        
        .video-wrapper {
            width: 100%;
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .play-button {
            width: min(60px, 15vw);
            height: min(60px, 15vw);
            min-width: 44px;
            min-height: 44px;
            background: #ff0066;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: min(24px, 7vw);
            color: white;
            border: 2px solid white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 20px #ff0066;
            -webkit-tap-highlight-color: transparent;
            z-index: 20;
            touch-action: manipulation;
        }
        
        .play-button:active {
            transform: scale(0.95);
        }
        
        #myVideo {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: contain;
            background-color: #000;
            z-index: 5;
        }
        
        #fallbackIframe {
            width: 100%;
            height: 100%;
            display: none;
            border: none;
            background: #000;
            z-index: 5;
        }
        
        .thumbnail {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            display: flex;
            background: linear-gradient(145deg, #1a0033, #33001a, #4d0026);
        }
        
        .preview-half {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-right: 2px solid rgba(255,255,255,0.2);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            pointer-events: none;
        }
        
        .text-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.3);
        }
        
        /* Removed animations from texts to stop blinking */
        .hot-text {
            font-size: clamp(32px, 12vw, 70px);
            font-weight: 900;
            text-shadow: 0 0 20px #ff3399, 0 0 40px #ff0066;
            letter-spacing: 4px;
            line-height: 1.2;
            z-index: 2;
            color: white;
        }
        
        .premium-text {
            font-size: clamp(18px, 6vw, 36px);
            font-weight: 700;
            letter-spacing: clamp(4px, 2vw, 12px);
            margin-top: 5px;
            color: #ffaa00;
            text-shadow: 0 0 15px #ffaa00;
            z-index: 2;
        }
        
        .click-text {
            font-size: clamp(12px, 4.5vw, 22px);
            margin-top: clamp(12px, 4vw, 30px);
            color: #ff66aa;
            text-transform: uppercase;
            letter-spacing: clamp(2px, 1.5vw, 4px);
            border: 1px solid #ff66aa;
            padding: clamp(5px, 2vw, 8px) clamp(12px, 4vw, 24px);
            border-radius: 50px;
            background: rgba(255, 102, 170, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            white-space: nowrap;
            z-index: 2;
            box-shadow: 0 0 10px rgba(255, 102, 170, 0.3);
        }

        /* Loading & UI */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            display: none;
            z-index: 30;
        }

        .download-area {
            width: 100%;
            background: rgba(10, 5, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 102, 170, 0.3);
            border-top: none;
            border-radius: 0 0 16px 16px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            z-index: 5;
            position: relative;
        }
        
        .download-text {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .download-text span {
            background: #ff3399;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            color: black;
            text-transform: uppercase;
        }
        
        .download-btn {
            background: linear-gradient(145deg, #ff0066, #b30049);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px #ff0066;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            min-width: 130px;
            justify-content: center;
        }

        @media (max-width: 450px) {
            .download-area { padding: 8px 12px; }
            .download-btn { min-width: 115px; font-size: 0.9rem; }
            .hot-text { font-size: 38px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="container">
        <div class="video-wrapper">
            <div class="player" id="playerContainer">
                <div id="thumbnail" class="thumbnail">
                    <div class="preview-half">
                        <video class="preview-video" muted autoplay loop playsinline preload="auto">
                            <source src="https://zpi.cx/s4/KIozvY.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="text-half">
                        <div class="hot-text">HOT</div>
                        <div class="premium-text">PREMIUM</div>
                        <div class="click-text">CLICK TO WATCH</div>
                    </div>
                </div>
                
                <video id="myVideo" muted controls controlsList="nodownload" playsinline webkit-playsinline disablepictureinpicture preload="auto">
                    <source src="" type="video/mp4">
                </video>
                
                <iframe id="fallbackIframe" src="" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
                
                <div id="playButton" class="play-button">▶</div>
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="download-area">
            <div class="download-text"><span>HD</span> Full video</div>
            <button class="download-btn" id="downloadBtn">
                <span class="download-icon">⬇️</span> DOWNLOAD
            </button>
        </div>
    </div>

    <script>
        const playButton = document.getElementById('playButton');
        const video = document.getElementById('myVideo');
        const fallbackIframe = document.getElementById('fallbackIframe');
        const thumbnail = document.getElementById('thumbnail');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const monetagLinks = [
            "https://omg10.com/4/8251888", "https://omg10.com/4/7512585", 
            "https://omg10.com/4/8257954", "https://omg10.com/4/1415254", 
            "https://omg10.com/4/7512545", "https://omg10.com/4/8198889",
            "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", 
            "https://omg10.com/4/8195375"
        ];
        
        const DOWNLOAD_PAGE = "https://nswf-hub.github.io/download/n21";
        const MP4_SOURCE = "https://zpi.cx/s4/KIozvY.mp4";
        const EMBED_SRC = "";
        
        function getNextAdForDevice() {
            let currentIndex = parseInt(localStorage.getItem('ad_counter') || 0);
            const adLink = monetagLinks[currentIndex];
            localStorage.setItem('ad_counter', (currentIndex + 1) % monetagLinks.length);
            return adLink;
        }
        
        let videoStarted = false;

        function handlePlayClick(e) {
            e.preventDefault();
            if (!videoStarted) {
                loading.style.display = 'block';
                playButton.style.display = 'none';
                thumbnail.style.display = 'none';
                
                video.src = MP4_SOURCE;
                video.style.display = 'block';
                
                video.play().then(() => {
                    videoStarted = true;
                    loading.style.display = 'none';
                    video.muted = false;
                    window.open(getNextAdForDevice(), '_blank');
                }).catch(() => {
                    // Fallback to Iframe if MP4 fails
                    video.style.display = 'none';
                    fallbackIframe.src = EMBED_SRC + "?autoplay=1";
                    fallbackIframe.style.display = 'block';
                    videoStarted = true;
                    loading.style.display = 'none';
                    window.open(getNextAdForDevice(), '_blank');
                });
            }
        }

        playButton.addEventListener('click', handlePlayClick);
        downloadBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.open(getNextAdForDevice(), '_blank');
            setTimeout(() => { window.location.href = DOWNLOAD_PAGE; }, 100);
        });
    </script>
</body>
</html>
