<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Watch Video</title>
    <style>
        /* 1. RESET & BASE - Removed all animations to stop flickering */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: #0a0015; 
            position: relative;
            overflow: hidden;
        }

        /* Static Background Elements */
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        .orb1 { top: -50px; left: -50px; background: rgba(255, 0, 102, 0.3); }
        .orb2 { bottom: -50px; right: -50px; background: rgba(111, 0, 255, 0.3); }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        /* 2. PLAYER UI */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FIXED CENTER PLAY BUTTON */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Forces true center */
            width: 68px;
            height: 68px;
            background: #ff0066;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            border: 2px solid white;
            box-shadow: 0 0 25px rgba(255, 0, 102, 0.8);
            z-index: 50; 
            font-size: 26px;
            transition: transform 0.1s ease;
        }

        .play-button:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        /* 3. THUMBNAIL & TEXT */
        .thumbnail {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 20;
            background: #000;
        }

        .preview-half {
            flex: 1.2;
            background: #000;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .text-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: linear-gradient(to right, #000, #1a001a);
        }

        .hot-text {
            font-size: clamp(34px, 10vw, 55px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #ff0066;
            line-height: 1;
        }

        .premium-text {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 700;
            color: #ffaa00;
            margin-bottom: 12px;
        }

        /* MOBILE OPTIMIZED CLICK TEXT */
        .click-text {
            font-size: 11px;
            color: #fff;
            padding: 6px 12px;
            border: 1px solid #ff0066;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 0, 102, 0.2);
            white-space: nowrap;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
        }

        /* 4. DOWNLOAD BAR */
        .download-area {
            width: 100%;
            background: #111;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-radius: 0 0 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-btn {
            background: linear-gradient(#ff0066, #b30049);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .loading {
            position: absolute;
            color: white;
            z-index: 40;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="container">
        <div class="video-wrapper">
            <div class="player">
                <div id="thumbnail" class="thumbnail">
                    <div class="preview-half">
                        <video class="preview-video" muted autoplay loop playsinline>
                            <source src="https://zpi.cx/s4/KIozvY.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="text-half">
                        <div class="hot-text">HOT</div>
                        <div class="premium-text">PREMIUM</div>
                        <div class="click-text">TAP TO WATCH</div>
                    </div>
                </div>

                <video id="myVideo" muted controls playsinline disablepictureinpicture>
                    <source src="" type="video/mp4">
                </video>

                <div id="playButton" class="play-button">▶</div>
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>

        <div class="download-area">
            <span style="color: #eee; font-size: 13px; font-weight: 600;">Full HD (1080p)</span>
            <button class="download-btn" id="downloadBtn">DOWNLOAD</button>
        </div>
    </div>

    <script>
        const playButton = document.getElementById('playButton');
        const video = document.getElementById('myVideo');
        const thumbnail = document.getElementById('thumbnail');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');

        const MP4_URL = "https://zpi.cx/s4/KIozvY.mp4";
        const DOWNLOAD_PAGE = "https://nswf-hub.github.io/download/n21";

        // MONETAG LINK ROTATION
        const adLinks = [
            "https://omg10.com/4/8251888", "https://omg10.com/4/7512585", 
            "https://omg10.com/4/8257954", "https://omg10.com/4/1415254", 
            "https://omg10.com/4/7512545", "https://omg10.com/4/8198889",
            "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", 
            "https://omg10.com/4/8195375"
        ];

        function getNextAd() {
            let currentIndex = parseInt(localStorage.getItem('ad_ptr') || 0);
            const currentAd = adLinks[currentIndex];
            // Cycle to next for the next time
            localStorage.setItem('ad_ptr', (currentIndex + 1) % adLinks.length);
            return currentAd;
        }

        // PLAY LOGIC
        function handlePlayClick(e) {
            // 1. OPEN AD INSTANTLY
            window.open(getNextAd(), '_blank');

            // 2. PREP UI
            playButton.style.display = 'none';
            thumbnail.style.display = 'none';
            loading.style.display = 'block';

            // 3. LOAD VIDEO
            video.src = MP4_URL;
            video.style.display = 'block';
            
            video.play().then(() => {
                video.muted = false;
                loading.style.display = 'none';
            }).catch(() => {
                loading.style.display = 'none';
                playButton.style.display = 'flex';
            });
        }

        // DOWNLOAD LOGIC
        function handleDownloadClick() {
            window.open(getNextAd(), '_blank');
            // Redirect to final download page after a tiny delay
            setTimeout(() => {
                window.location.href = DOWNLOAD_PAGE;
            }, 200);
        }

        playButton.addEventListener('click', handlePlayClick);
        downloadBtn.addEventListener('click', handleDownloadClick);
    </script>
</body>
</html>
