<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Improved viewport for better scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Watch Video – Split Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: radial-gradient(circle at 20% 30%, #1a0033, #000 90%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated floating particles – optimized for mobile */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="8" cy="8" r="1" fill="rgba(255,200,200,0.1)"/><circle cx="32" cy="15" r="2" fill="rgba(200,100,255,0.1)"/></svg>');
            opacity: 0.4;
            animation: float 30s linear infinite; /* slower on mobile for performance */
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes float {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-20px) translateX(5px); } /* smaller movement */
        }
        
        /* Background orbs – reduced size on mobile via media query */
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 51, 153, 0.15), transparent 70%);
            filter: blur(60px);
            z-index: 0;
            animation: orbMove 15s ease-in-out infinite alternate;
        }
        
        .orb1 {
            top: 5%;
            left: 0%;
            background: radial-gradient(circle at center, rgba(255, 100, 150, 0.2), transparent);
        }
        
        .orb2 {
            bottom: 5%;
            right: 0%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at center, rgba(170, 68, 255, 0.15), transparent);
            animation-duration: 25s;
        }
        
        /* Mobile adjustments for orbs */
        @media (max-width: 600px) {
            .bg-orb {
                width: 200px;
                height: 200px;
                filter: blur(40px);
                opacity: 0.6; /* a bit more visible but smaller */
            }
            .orb2 {
                width: 250px;
                height: 250px;
            }
        }
        
        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, -15px) scale(1.05); }
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }
        
        .video-wrapper {
            width: 100%;
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* for Safari */
            border-radius: 16px; /* slightly more rounded on mobile */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Play button – already responsive, but ensure tap target is big enough */
        .play-button {
            width: min(60px, 15vw);
            height: min(60px, 15vw);
            min-width: 44px; /* minimum tap target */
            min-height: 44px;
            background: #ff0066;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: min(24px, 7vw);
            color: white;
            border: 2px solid white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 30px #ff0066;
            -webkit-tap-highlight-color: transparent;
            z-index: 20;
            touch-action: manipulation;
        }
        
        .play-button:hover {
            transform: scale(1.1);
            background: #ff3388;
            box-shadow: 0 0 40px #ff3388;
        }
        
        .play-button:active {
            transform: scale(0.95);
        }
        
        #myVideo {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: cover;
            background: #000;
            z-index: 5;
        }
        
        /* Split thumbnail */
        .thumbnail {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            display: flex;
            background: linear-gradient(145deg, #1a0033, #33001a, #4d0026);
        }
        
        .preview-half {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-right: 2px solid rgba(255,255,255,0.2);
        }
        
        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        .text-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px; /* slightly reduced for very small screens */
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        
        /* Glow balls – make them a bit smaller on mobile */
        .glow-ball {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #ff3399, transparent);
            filter: blur(40px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        
        .ball1 {
            top: -30px;
            right: -30px;
            animation: move 8s ease-in-out infinite;
        }
        
        .ball2 {
            bottom: -30px;
            left: -30px;
            background: radial-gradient(circle at center, #aa44ff, transparent);
            animation: move 10s ease-in-out infinite reverse;
        }
        
        @media (max-width: 500px) {
            .glow-ball {
                width: 100px;
                height: 100px;
                filter: blur(30px);
            }
        }
        
        @keyframes move {
            0% { transform: translate(0, 0); }
            50% { transform: translate(15px, 15px); }
            100% { transform: translate(0, 0); }
        }
        
        /* Text styles – already responsive, but fine-tuned for smallest screens */
        .hot-text {
            font-size: clamp(32px, 12vw, 70px); /* slightly smaller minimum for very narrow phones */
            font-weight: 900;
            text-shadow: 0 0 30px #ff3399, 0 0 60px #ff0066;
            letter-spacing: 4px;
            animation: flicker 2s linear infinite;
            line-height: 1.2;
            z-index: 2;
        }
        
        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 30px #ff3399; }
            25% { opacity: 0.9; text-shadow: 0 0 40px #ff66aa; }
            50% { opacity: 1; text-shadow: 0 0 30px #ff0066; }
            75% { opacity: 0.9; text-shadow: 0 0 50px #ff3388; }
            100% { opacity: 1; text-shadow: 0 0 30px #ff3399; }
        }
        
        .premium-text {
            font-size: clamp(18px, 6vw, 36px);
            font-weight: 700;
            letter-spacing: clamp(4px, 2vw, 12px);
            margin-top: 5px;
            color: #ffaa00;
            text-shadow: 0 0 20px #ffaa00;
            z-index: 2;
        }
        
        .click-text {
            font-size: clamp(12px, 4.5vw, 22px);
            margin-top: clamp(12px, 4vw, 30px);
            color: #ff66aa;
            text-transform: uppercase;
            letter-spacing: clamp(2px, 1.5vw, 4px);
            border: 1px solid #ff66aa;
            padding: clamp(5px, 2vw, 8px) clamp(12px, 4vw, 24px);
            border-radius: 50px;
            background: rgba(255, 102, 170, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: glow 2s ease-in-out infinite;
            white-space: nowrap;
            z-index: 2;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px #ff66aa; }
            50% { box-shadow: 0 0 20px #ff66aa; }
            100% { box-shadow: 0 0 10px #ff66aa; }
        }
        
        /* Additional breakpoint for very small devices (like iPhone SE) */
        @media (max-width: 375px) {
            .hot-text {
                font-size: 28px;
            }
            .premium-text {
                font-size: 16px;
            }
            .click-text {
                font-size: 11px;
                padding: 4px 10px;
            }
            .play-button {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            display: none;
            z-index: 30;
        }
        
        video::-webkit-media-controls-download-button {
            display: none !important;
        }
        
        video::-webkit-media-controls-enclosure {
            overflow: hidden;
        }
        
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px);
        }
    </style>
</head>
<body>
    <!-- Background orbs (smaller on mobile via CSS) -->
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="container">
        <div class="video-wrapper">
            <div class="player" id="playerContainer">
                <!-- Split thumbnail -->
                <div id="thumbnail" class="thumbnail">
                    <div class="glow-ball ball1"></div>
                    <div class="glow-ball ball2"></div>
                    
                    <div class="preview-half">
                        <video class="preview-video" muted autoplay loop playsinline preload="auto">
                            <source src="https://cdn.videy.co/hxrqpJCs1.mp4" type="video/mp4">
                        </video>
                    </div>
                    
                    <div class="text-half">
                        <div class="hot-text">HOT</div>
                        <div class="premium-text">PREMIUM</div>
                        <div class="click-text">CLICK TO WATCH</div>
                    </div>
                </div>
                
                <video id="myVideo" controls controlsList="nodownload" playsinline webkit-playsinline disablepictureinpicture preload="auto">
                    <source src="https://cdn.videy.co/hxrqpJCs1.mp4" type="video/mp4">
                </video>
                
                <div id="playButton" class="play-button">
                    ▶
                </div>
                
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Get elements
        const playButton = document.getElementById('playButton');
        const video = document.getElementById('myVideo');
        const thumbnail = document.getElementById('thumbnail');
        const loading = document.getElementById('loading');
        
        // ===== YOUR 10 MONETAG LINKS =====
        const monetagLinks = [
            "https://omg10.com/4/8251888",
            "https://omg10.com/4/7512585", 
            "https://omg10.com/4/8257954",
            "https://omg10.com/4/1415254", 
            "https://omg10.com/4/7512545", 
            "https://omg10.com/4/8198889",
            "https://omg10.com/4/8236017", 
            "https://omg10.com/4/8247899", 
            "https://omg10.com/4/8195375",
            "https://omg10.com/4/8257975"
        ];
        
        function getDeviceId() {
            let deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('device_id', deviceId);
            }
            return deviceId;
        }
        
        function getNextAdForDevice() {
            const deviceId = getDeviceId();
            const counterKey = 'ad_counter_' + deviceId;
            let currentIndex = localStorage.getItem(counterKey);
            
            if (currentIndex === null) {
                currentIndex = 0;
            } else {
                currentIndex = parseInt(currentIndex);
            }
            
            const adLink = monetagLinks[currentIndex];
            currentIndex = (currentIndex + 1) % monetagLinks.length;
            localStorage.setItem(counterKey, currentIndex);
            
            return adLink;
        }
        
        let videoStarted = false;
        
        function handlePlayClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!videoStarted) {
                loading.style.display = 'block';
                
                const adLink = getNextAdForDevice();
                window.open(adLink, '_blank');
                
                playButton.style.display = 'none';
                thumbnail.style.display = 'none';
                video.style.display = 'block';
                
                const playPromise = video.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        loading.style.display = 'none';
                        videoStarted = true;
                    }).catch(error => {
                        console.log("Play failed:", error);
                        loading.style.display = 'none';
                        video.controls = true;
                        videoStarted = true;
                    });
                }
            }
        }
        
        playButton.addEventListener('click', handlePlayClick);
        playButton.addEventListener('touchstart', handlePlayClick, { passive: false });
        
        video.addEventListener('click', function(e) {
            if (!videoStarted) {
                handlePlayClick(e);
            }
        });
        
        video.addEventListener('ended', function() {
            videoStarted = false;
            playButton.style.display = 'flex';
            thumbnail.style.display = 'flex';
            video.style.display = 'none';
            video.controls = true;
            video.load();
        });
        
        video.addEventListener('error', function() {
            loading.style.display = 'none';
            console.log("Video error - check your video URL");
            playButton.style.display = 'none';
            thumbnail.style.display = 'none';
            video.style.display = 'block';
            video.controls = true;
        });
        
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
        
        video.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        video.load();
        console.log("Split preview with mobile-optimized background");
    </script>
</body>
</html>
