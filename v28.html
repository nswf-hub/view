<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Simple Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
        }
        
        .video-wrapper {
            width: 100%;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }
        
        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .play-button {
            width: min(80px, 20vw);
            height: min(80px, 20vw);
            background: #cc2b4b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: min(30px, 8vw);
            color: white;
            border: 2px solid white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            -webkit-tap-highlight-color: transparent;
        }
        
        .play-button:hover {
            transform: scale(1.1);
            background: #ff3b5c;
        }
        
        .play-button:active {
            transform: scale(0.95);
        }
        
        #myVideo {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: cover;
            background: #000;
        }
        
        /* loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <div class="player" id="playerContainer">
                <video id="myVideo" controls playsinline webkit-playsinline>
                    <source src="https://cdn.videy.co/8utcL3FQ1.mp4" type="video/mp4">
                </video>
                
                <div id="playButton" class="play-button">
                    ▶
                </div>
                
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Get elements
        const playButton = document.getElementById('playButton');
        const video = document.getElementById('myVideo');
        const loading = document.getElementById('loading');
        
        // ===== YOUR 10 MONETAG LINKS =====
        const monetagLinks = [
            "https://omg10.com/4/8251888",
            "https://omg10.com/4/7512585", 
            "https://omg10.com/4/8257954",
            "https://omg10.com/4/1415254", 
            "https://omg10.com/4/7512545", 
            "https://omg10.com/4/8198889",
            "https://omg10.com/4/8236017", 
            "https://omg10.com/4/8247899", 
            "https://omg10.com/4/8195375",
            "https://omg10.com/4/8257975"
        ];
        
        // Function to get or create device ID (based on IP/device fingerprint)
        function getDeviceId() {
            let deviceId = localStorage.getItem('device_id');
            
            if (!deviceId) {
                // Create a simple random ID for this device
                deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('device_id', deviceId);
            }
            
            return deviceId;
        }
        
        // Function to get next ad for this device
        function getNextAdForDevice() {
            const deviceId = getDeviceId();
            
            // Get the current counter for this device
            const counterKey = 'ad_counter_' + deviceId;
            let currentIndex = localStorage.getItem(counterKey);
            
            if (currentIndex === null) {
                currentIndex = 0;
            } else {
                currentIndex = parseInt(currentIndex);
            }
            
            // Get the ad link
            const adLink = monetagLinks[currentIndex];
            
            // Update counter for next time (cycle through)
            currentIndex = (currentIndex + 1) % monetagLinks.length;
            localStorage.setItem(counterKey, currentIndex);
            
            return adLink;
        }
        
        // Variable to track if video is playing
        let videoStarted = false;
        
        playButton.addEventListener('click', function() {
            if (!videoStarted) {
                // Show loading
                loading.style.display = 'block';
                
                // Get next ad for this specific device
                const adLink = getNextAdForDevice();
                
                // Open ad in new tab
                window.open(adLink, '_blank');
                
                // Small delay to ensure ad opens, then play video
                setTimeout(() => {
                    // Hide play button, show video
                    playButton.style.display = 'none';
                    video.style.display = 'block';
                    
                    // Play video (with promise catch for mobile)
                    const playPromise = video.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            loading.style.display = 'none';
                        }).catch(error => {
                            console.log("Auto-play prevented:", error);
                            loading.style.display = 'none';
                            // Still show video, user can press play
                        });
                    }
                }, 100);
                
                videoStarted = true;
            }
        });
        
        // Handle mobile touch events properly
        playButton.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Prevent double-firing on mobile
        }, { passive: false });
        
        // If user clicks video before it's started
        video.addEventListener('click', function() {
            if (!videoStarted) {
                playButton.click();
            }
        });
        
        // Handle video end - reset for next view
        video.addEventListener('ended', function() {
            videoStarted = false;
            playButton.style.display = 'flex';
            video.style.display = 'none';
            
            // Reset video source to beginning (optional)
            video.load();
        });
        
        // Handle video error
        video.addEventListener('error', function() {
            loading.style.display = 'none';
            console.log("Video error - check your video URL");
        });
        
        // Prevents page zoom on double-tap for better mobile experience
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
