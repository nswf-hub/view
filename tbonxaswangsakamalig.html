<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Watch Video</title>
    <style>
        /* 1. RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: #0a0015; 
            position: relative;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        .orb1 { top: -50px; left: -50px; background: rgba(255, 0, 102, 0.3); }
        .orb2 { bottom: -50px; right: -50px; background: rgba(111, 0, 255, 0.3); }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        /* 2. PLAYER UI */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: #ff0066;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            border: 2px solid white;
            box-shadow: 0 0 25px rgba(255, 0, 102, 0.8);
            z-index: 50; 
            font-size: 26px;
            transition: all 0.2s ease;
        }

        .thumbnail {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 20;
            background: #000;
            cursor: pointer;
        }

        .preview-half {
            flex: 1.2;
            background: #000;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .text-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: linear-gradient(to right, #000, #1a001a);
        }

        .hot-text { font-size: clamp(30px, 8vw, 55px); font-weight: 900; color: #fff; text-shadow: 0 0 10px #ff0066; line-height: 1; }
        .premium-text { font-size: 14px; font-weight: 700; color: #ffaa00; margin-bottom: 8px; }

        #myVideo, #embedContainer {
            width: 100%;
            height: 100%;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* 3. DOWNLOAD BAR */
        .download-area {
            width: 100%;
            background: #111;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-radius: 0 0 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-btn {
            background: linear-gradient(#ff0066, #b30049);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .loading {
            position: absolute;
            color: white;
            z-index: 40;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="container">
        <div class="video-wrapper">
            <div class="player">
                
                <div id="thumbnail" class="thumbnail">
                    <div class="preview-half">
                        <video class="preview-video" muted autoplay loop playsinline>
                            <source src="https://zpi.cx/s4/qf4l340.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="text-half">
                        <div class="hot-text">HOT</div>
                        <div class="premium-text">PREMIUM</div>
                    </div>
                </div>

                <video id="myVideo" controls playsinline>
                    <source src="https://zpi.cx/s4/qf4l340.mp4" type="video/mp4">
                </video>

                <div id="embedContainer">
                    <iframe id="embedFrame" src="" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
                </div>

                <div id="playButton" class="play-button">▶</div>
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>

        <div class="download-area">
            <span style="color: #eee; font-size: 13px; font-weight: 600;">Full HD</span>
            <button class="download-btn" id="downloadBtn">DOWNLOAD</button>
        </div>
    </div>

    <script>
        // --- MANUAL CONFIGURATION ---
        const USE_EMBED = true; // Set to true for Iframe, false for MP4
        const EMBED_LINK = ""; // Embed format only
        const DOWNLOAD_PAGE = "https://nswf-hub.github.io/download/tbonxaswangsakamalig";
        // ----------------------------

        const playButton = document.getElementById('playButton');
        const video = document.getElementById('myVideo');
        const thumbnail = document.getElementById('thumbnail');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');
        const embedContainer = document.getElementById('embedContainer');
        const embedFrame = document.getElementById('embedFrame');

        const adLinks = [
            "https://omg10.com/4/8251888", "https://omg10.com/4/7512585", 
            "https://omg10.com/4/8257954", "https://omg10.com/4/1415254"
        ];

        function getNextAd() {
            let currentIndex = parseInt(localStorage.getItem('ad_ptr') || 0);
            const currentAd = adLinks[currentIndex % adLinks.length];
            localStorage.setItem('ad_ptr', (currentIndex + 1));
            return currentAd;
        }

        // --- PLAY LOGIC ---
        function handlePlayClick() {
            window.open(getNextAd(), '_blank');

            if (USE_EMBED) {
                thumbnail.style.display = 'none';
                playButton.style.display = 'none';
                loading.style.display = 'none';
                embedContainer.style.display = 'block';
                embedFrame.src = EMBED_LINK;
            } else {
                loading.style.display = 'block';
                playButton.style.display = 'none';
                video.style.display = 'block';
                video.play().then(() => {
                    thumbnail.style.display = 'none';
                    loading.style.display = 'none';
                }).catch(() => {
                    loading.style.display = 'none';
                    playButton.style.display = 'flex';
                });
            }
        }

        // --- DOWNLOAD LOGIC (FIXED) ---
        function handleDownloadClick() {
            // 1. Open the Ad in a new tab
            window.open(getNextAd(), '_blank');
            
            // 2. Redirect the current page to the download link after 300ms
            setTimeout(() => {
                window.location.href = DOWNLOAD_PAGE;
            }, 300);
        }

        playButton.addEventListener('click', handlePlayClick);
        thumbnail.addEventListener('click', handlePlayClick);
        downloadBtn.addEventListener('click', handleDownloadClick);
    </script>
</body>
</html>
