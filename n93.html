<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Premium Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #0d0d0d;
            color: #ffffff;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
        }
        
        .video-wrapper {
            width: 100%;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
        }
        
        .player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            display: flex;
            background: #111;
        }
        
        .preview-half {
            flex: 1;
            background: #000;
            border-right: 1px solid #222;
        }
        
        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .text-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
        }
        
        .hot-text {
            font-size: 32px;
            font-weight: 900;
            color: #ff0066;
        }

        .play-button {
            position: absolute;
            z-index: 30;
            width: 65px;
            height: 65px;
            background: #ff0066;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
            color: white;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.5);
        }

        #myVideo {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: contain;
        }

        .video-counter {
            text-align: center;
            margin: 15px 0 10px;
            color: #777;
            font-size: 14px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .nav-button {
            background: #222;
            border: 1px solid #444;
            color: #eee;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            max-width: 140px;
            transition: background 0.2s;
        }

        .nav-button:hover:not(:disabled) {
            background: #333;
        }

        .nav-button:disabled { 
            opacity: 0.2; 
            cursor: not-allowed;
        }

        .loading {
            position: absolute;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            z-index: 40;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-wrapper">
            <div class="player">
                <div id="thumbnail" class="thumbnail">
                    <div class="preview-half">
                        <video class="preview-video" muted autoplay loop playsinline id="previewVideo">
                            <source src="https://zpi.cx/s12/KnZchXO.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="text-half">
                        <div class="hot-text">WATCH</div>
                        <div style="color: #ffaa00; font-weight: bold; margin-top: 5px;">PREMIUM</div>
                    </div>
                </div>
                
                <video id="myVideo" controls controlsList="nodownload" playsinline></video>
                
                <div id="playButton" class="play-button">▶</div>
                <div id="loading" class="loading">Loading...</div>
            </div>
        </div>

        <div id="videoCounter" class="video-counter">Video 1 of 4</div>
        <div class="nav-buttons">
            <button id="prevButton" class="nav-button" disabled>Previous</button>
            <button id="nextButton" class="nav-button" disabled>Next</button>
        </div>
    </div>

    <script>
        (function() {
            // Your Video URLs
            const videoSources = [
"https://zpi.cx/s12/L5X3N75E.mp4", "https://zpi.cx/s12/00M8iVe.mp4",
"https://zpi.cx/s12/rfAToTgmM.mp4", "https://zpi.cx/s12/NdOzHC.mp4",
"https://zpi.cx/s12/FKHOkjmm.mp4", "https://zpi.cx/s12/w1BRxjNS9Pm.mp4",
"https://zpi.cx/s12/JvbUYvbF.mp4", "https://zpi.cx/s12/xxf7qi72SIOu.mp4",
"https://zpi.cx/s12/6WQiCxDG.mp4", "https://zpi.cx/s12/bma73N70b.mp4",
"https://zpi.cx/s12/owKD23T.mp4", "https://zpi.cx/s12/0O09WC6Eez9.mp4",
"https://zpi.cx/s12/1t5qV1GRgk.mp4", "https://zpi.cx/s12/JhqDWPxg7mwX.mp4",
"https://zpi.cx/s12/kXiz2w5xKMXl.mp4", "https://zpi.cx/s12/sZLQ8jTVb.mp4",
"https://zpi.cx/s12/Vcssznf0dI0P.mp4", "https://zpi.cx/s12/s4QGxeLqAl.mp4",
"https://zpi.cx/s12/NO0iU2FZhLG.mp4", "https://zpi.cx/s12/0rTIZc3.mp4",
"https://zpi.cx/s12/9lpKG771U.mp4", "https://zpi.cx/s12/2IiZYCyB28BV.mp4",
"https://zpi.cx/s12/Zz3YAAfUH.mp4", "https://zpi.cx/s12/6SYQppX8xa.mp4",
"https://zpi.cx/s12/R58puvRK0y41.mp4", "https://zpi.cx/s12/lTMlMhcP.mp4",
"https://zpi.cx/s12/ZeH9hbwNJ2v.mp4", "https://zpi.cx/s12/Q3evjrzV3.mp4",
"https://zpi.cx/s12/UgMKSk3.mp4", "https://zpi.cx/s12/24kh2knp1s1Y.mp4",
"https://zpi.cx/s12/Ssts0OW67.mp4", "https://zpi.cx/s12/xZd7fsf.mp4",
"https://zpi.cx/s12/hWgF73zG5.mp4", "https://zpi.cx/s12/uOyaEiOlX.mp4",
"https://zpi.cx/s12/PZE5EdDF0s.mp4", "https://zpi.cx/s12/N3kUF7o.mp4",
"https://zpi.cx/s12/5ZekX1SY3d.mp4", "https://zpi.cx/s12/n4BqnpRRDpC6.mp4",
"https://zpi.cx/s12/rkCxmuV8.mp4", "https://zpi.cx/s12/1gQfw2J.mp4",
"https://zpi.cx/s12/KnZchXO.mp4", "https://zpi.cx/s12/RQuIZP.mp4",
"https://zpi.cx/s12/MR9EMC9e0e6.mp4", "https://zpi.cx/s12/xUf6wFs.mp4",
"https://zpi.cx/s12/KMi6Mz3zQMX.mp4", "https://zpi.cx/s12/6pzjhGO4VOo.mp4",
"https://zpi.cx/s12/5KsHdPhmSo.mp4"
              
            ];

            // Your Ad Links (10 total)
            const monetagLinks = [
                "https://otieu.com/4/8251888",
                "https://otieu.com/4/7512585",
                "https://otieu.com/4/8257954",
                "https://otieu.com/4/1415254",
                "https://otieu.com/4/7512545",
                "https://otieu.com/4/8198889",
                "https://otieu.com/4/8236017",
                "https://otieu.com/4/8247899",
                "https://otieu.com/4/8195375",
                "https://otieu.com/4/8257975"
            ];

            const video = document.getElementById('myVideo');
            const playBtn = document.getElementById('playButton');
            const thumbnail = document.getElementById('thumbnail');
            const prevBtn = document.getElementById('prevButton');
            const nextBtn = document.getElementById('nextButton');
            const counter = document.getElementById('videoCounter');
            const loading = document.getElementById('loading');

            let currentIdx = 0;
            let isFirstLoad = true; 

            function updateUI() {
                // Update text and buttons
                counter.textContent = `Video ${currentIdx + 1} of ${videoSources.length}`;
                prevBtn.disabled = (currentIdx === 0);
                nextBtn.disabled = (currentIdx === videoSources.length - 1);
                
                // Prepare video source
                video.src = videoSources[currentIdx];
                video.load();

                // Only show thumbnail on very first page load, otherwise show the player
                if (isFirstLoad && currentIdx === 0) {
                    thumbnail.style.display = 'flex';
                    video.style.display = 'none';
                } else {
                    thumbnail.style.display = 'none';
                    video.style.display = 'block';
                }

                playBtn.style.display = 'flex';
                video.pause();
            }

            function handlePlayAction() {
                isFirstLoad = false;
                
                // ROTATION LOGIC:
                // Uses modulo operator (%) to loop back to Ad #1 after Ad #10
                const adToOpen = monetagLinks[currentIdx % monetagLinks.length];
                window.open(adToOpen, '_blank');

                // UI feedback
                loading.style.display = 'block';
                thumbnail.style.display = 'none';
                playBtn.style.display = 'none';
                video.style.display = 'block';

                video.play().catch(err => {
                    console.log("Playback failed:", err);
                }).finally(() => {
                    loading.style.display = 'none';
                });
            }

            playBtn.addEventListener('click', handlePlayAction);
            
            nextBtn.addEventListener('click', () => {
                if(currentIdx < videoSources.length - 1) {
                    isFirstLoad = false; // Transitioning to player view
                    currentIdx++;
                    updateUI();
                }
            });

            prevBtn.addEventListener('click', () => {
                if(currentIdx > 0) {
                    isFirstLoad = false;
                    currentIdx--;
                    updateUI();
                }
            });

            video.addEventListener('ended', () => {
                playBtn.style.display = 'flex';
            });

            // Start the player
            updateUI();
        })();
    </script>
</body>
</html>
