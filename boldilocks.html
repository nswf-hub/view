<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Video Gallery · Centered Layout</title>

<style>
body{
background:#000000;
font-family:Arial,sans-serif;
padding:20px;
color:#ffffff;
margin:0;
display:flex;
justify-content:center;
}

/* Main container - centers everything */
.main-container{
max-width:1200px;
width:100%;
margin:0 auto;
padding:0 20px;
}

/* Menu bar styles */
.menu-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 0 20px 0;
border-bottom:2px solid #ff00a8;
margin-bottom:20px;
position:relative;
}

.logo-img{
height:60px;
cursor:pointer;
}

/* Desktop menu links */
.menu-links{
display:flex;
gap:30px;
margin:0 30px;
}

.menu-links a{
color:#ffffff;
text-decoration:none;
font-size:16px;
cursor:pointer;
white-space:nowrap;
}

.menu-links a:hover{
color:#ff00a8;
}

/* Search container */
.search-container{
display:flex;
align-items:center;
}

#searchInput{
padding:8px 15px;
border-radius:20px;
border:2px solid #ff00a8;
background:#222;
color:white;
font-size:13px;
width:160px;
outline:none;
}

#searchInput::placeholder{
color:#999;
font-size:12px;
}

#searchBtn{
background:#ff00a8;
color:white;
border:none;
border-radius:20px;
padding:8px 15px;
margin-left:5px;
cursor:pointer;
font-weight:bold;
font-size:13px;
}

/* Hamburger icon */
.hamburger{
display:none;
font-size:30px;
color:#ff00a8;
cursor:pointer;
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
z-index:10;
}

/* Mobile styles */
@media (max-width: 768px) {
    .main-container{
        padding:0 10px;
    }
    
    .menu-bar{
        flex-wrap:wrap;
        justify-content:flex-start;
        padding:15px 0 5px 0;
        min-height:70px;
    }
    
    .hamburger{
        display:block;
        left:5px;
    }
    
    .logo-img{
        height:45px;
        margin:0 auto;
        position:absolute;
        left:50%;
        transform:translateX(-50%);
    }
    
    .search-container{
        order:3;
        width:100%;
        justify-content:flex-end;
        margin:15px 0 5px 0;
        padding-right:5px;
    }
    
    #searchInput{
        width:140px;
        padding:6px 10px;
        font-size:12px;
    }
    
    #searchBtn{
        padding:6px 12px;
        font-size:12px;
    }
    
    .menu-links{
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:250px;
        height:100vh;
        background:#111111;
        flex-direction:column;
        padding:80px 20px 20px;
        z-index:100;
        border-right:2px solid #ff00a8;
        margin:0;
        gap:20px;
    }
    
    .menu-links a{
        font-size:18px;
    }
    
    .menu-links.show{
        display:flex;
    }
    
    .menu-overlay{
        display:none;
        position:fixed;
        top:0;
        left:0;
        right:0;
        bottom:0;
        background:rgba(0,0,0,0.7);
        z-index:90;
    }
    
    .menu-overlay.show{
        display:block;
    }
}

@media (max-width: 480px) {
    #searchInput{
        width:120px;
    }
}

#player{
display:none;
margin:20px 0;
text-align:center;
}

/* Tags container */
.tags-container{
margin-bottom:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.tag{
background:#ff00a8;
color:#ffffff;
padding:8px 18px;
border-radius:30px;
font-size:14px;
font-weight:bold;
letter-spacing:0.5px;
text-transform:uppercase;
box-shadow:0 2px 5px rgba(255,0,168,0.3);
}

#player video{
width:100%;
max-width:900px;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:12px 30px;
background:#ff00a8;
color:white;
text-decoration:none;
border-radius:4px;
}

/* Grid - exactly 4 columns on desktop */
.grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:25px;
margin-top:20px;
}

/* Responsive grid */
@media (max-width: 1000px) {
    .grid{
        grid-template-columns:repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:15px;
    }
}

@media (max-width: 480px) {
    .grid{
        grid-template-columns:repeat(1, 1fr);
        gap:15px;
    }
}

.card{
cursor:pointer;
width:100%;
}

.thumb{
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
aspect-ratio:16/9;
}

.thumb video{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
text-align:center;
margin-top:8px;
font-size:14px;
font-weight:bold;
}

.card.playing{
display:none;
}

.no-results{
text-align:center;
padding:40px;
color:#ff00a8;
font-size:18px;
grid-column:1/-1;
}

@media (max-width:600px){
.tag{padding:6px 12px;font-size:12px;}
}
</style>
</head>

<body>
<div class="main-container">
<!-- Menu overlay for mobile -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<div class="menu-bar">
<!-- Hamburger icon for mobile -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- Logo -->
<img src="https://zpi.cx/b/uiDMr.png" class="logo-img" onclick="goHome()">

<!-- Menu links -->
<div class="menu-links" id="menuLinks">
<a href="#" onclick="goHome(); closeMenu(); return false;">Home</a>
<a href="#" onclick="handleMenuClick('trending'); closeMenu(); return false;">Trending</a>
<a href="#" onclick="handleMenuClick('latest'); closeMenu(); return false;">Latest</a>
</div>

<!-- Search bar -->
<div class="search-container">
<input type="text" id="searchInput" placeholder="Search...">
<button id="searchBtn" onclick="searchVideos()">🔍</button>
</div>
</div>

<div id="player">
<!-- Tags container -->
<div class="tags-container" id="tagsContainer"></div>
<video id="mainVideo" controls></video>
<a href="#" id="downloadBtn" class="download-btn" onclick="handleDownloadClick(event)">⬇ DOWNLOAD</a>
</div>

<div class="grid" id="videoGrid"></div>
</div>

<script>
const adLinks = [
    "https://omg10.com/4/8251888", "https://omg10.com/4/7512585", "https://omg10.com/4/8257954",
    "https://omg10.com/4/1415254", "https://omg10.com/4/7512545", "https://omg10.com/4/8198889",
    "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", "https://omg10.com/4/8195375"
];

// ===== VIDEOS LIST WITH TAGS =====
const videos = [
    {title:"HOT DANCE", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n1", seekTime: 5, tags: ["wife", "sexy", "dance"]},
    {title:"TRENDING", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n2", seekTime: 12, tags: ["blonde", "hot", "trending"]},
    {title:"VIRAL CLIP", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n3", seekTime: 8, tags: ["sexy", "viral", "girl"]},
    {title:"MIDNIGHT", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n4", seekTime: 15, tags: ["wife", "night", "romantic"]},
    {title:"CHERRY", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n5", seekTime: 20, tags: ["blonde", "cherry", "sweet"]},
    {title:"NEON", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n6", seekTime: 3, tags: ["neon", "party", "sexy"]},
    {title:"PURPLE", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n7", seekTime: 10, tags: ["purple", "wife", "dress"]},
    {title:"VELVET", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n8", seekTime: 7, tags: ["velvet", "blonde", "luxury"]},
    {title:"CRIMSON", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n9", seekTime: 18, tags: ["crimson", "sexy", "red"]},
    {title:"BLAZE", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n10", seekTime: 25, tags: ["blaze", "hot", "wife"]},
    {title:"DANCE", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n1", seekTime: 5, tags: ["wife", "sexy", "dance"]},
    {title:"HOT", url:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://nswf-hub.github.io/download/n2", seekTime: 12, tags: ["blonde", "hot", "trending"]}
];

let adCounter = localStorage.getItem('adCounter') || 0;
let currentVideo = null;
let currentCardId = null;

function toggleMenu(){
    document.getElementById('menuLinks').classList.toggle('show');
    document.getElementById('menuOverlay').classList.toggle('show');
}

function closeMenu(){
    document.getElementById('menuLinks').classList.remove('show');
    document.getElementById('menuOverlay').classList.remove('show');
}

function getNextAd(){
    let link = adLinks[adCounter % adLinks.length];
    adCounter = (Number(adCounter) + 1) % adLinks.length;
    localStorage.setItem('adCounter', adCounter);
    return link;
}

// Function to display tags for current video
function displayTags(tags){
    let container = document.getElementById('tagsContainer');
    container.innerHTML = '';
    
    if(tags && tags.length > 0){
        tags.forEach(tag => {
            let tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = '#' + tag;
            container.appendChild(tagSpan);
        });
    }
}

// Search function
function searchVideos(){
    let searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    let grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    
    if(searchTerm === ''){
        videos.forEach((video, index) => {
            grid.appendChild(createVideoCard(video, index));
        });
        return;
    }
    
    let results = 0;
    videos.forEach((video, index) => {
        let titleMatch = video.title.toLowerCase().includes(searchTerm);
        let tagMatch = video.tags.some(tag => tag.toLowerCase().includes(searchTerm));
        
        if(titleMatch || tagMatch){
            grid.appendChild(createVideoCard(video, index));
            results++;
        }
    });
    
    if(results === 0){
        let noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.textContent = 'No videos found matching "' + searchTerm + '"';
        grid.appendChild(noResults);
    }
}

// Create video card
function createVideoCard(video, index){
    let card = document.createElement('div');
    card.className = 'card';
    card.id = 'card'+index;
    
    let thumbDiv = document.createElement('div');
    thumbDiv.className = 'thumb';
    
    let vid = document.createElement('video');
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    
    let source = document.createElement('source');
    source.src = video.url;
    source.type = 'video/mp4';
    vid.appendChild(source);
    
    vid.onloadedmetadata = function(){
        let seekTime = video.seekTime || 10;
        if(this.duration >= seekTime){
            this.currentTime = seekTime;
        } else {
            this.currentTime = this.duration * 0.8;
        }
    };
    
    vid.onseeked = function(){
        this.pause();
    };
    
    thumbDiv.appendChild(vid);
    
    let titleDiv = document.createElement('div');
    titleDiv.className = 'title';
    titleDiv.textContent = video.title;
    
    card.appendChild(thumbDiv);
    card.appendChild(titleDiv);
    
    card.onclick = () => playVideo(index);
    
    return card;
}

// Create all thumbnails
function createThumbnails(){
    let grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    
    videos.forEach((video, index) => {
        grid.appendChild(createVideoCard(video, index));
    });
}

function playVideo(index){
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    
    currentVideo = videos[index];
    currentCardId = 'card'+index;
    document.getElementById(currentCardId).classList.add('playing');
    
    window.open(getNextAd(), '_blank');
    
    let player = document.getElementById('player');
    player.style.display = 'block';
    
    displayTags(currentVideo.tags);
    
    let mainVideo = document.getElementById('mainVideo');
    mainVideo.src = currentVideo.url;
    mainVideo.play();
    
    let downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.href = currentVideo.download;
    
    window.scrollTo({top: player.offsetTop, behavior:'smooth'});
    closeMenu();
}

function handleDownloadClick(e){
    e.preventDefault();
    window.open(getNextAd(), '_blank');
    setTimeout(() => window.location.href = currentVideo.download, 100);
}

function goHome(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('mainVideo').pause();
    
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    
    document.getElementById('searchInput').value = '';
    createThumbnails();
    window.scrollTo({top:0, behavior:'smooth'});
    closeMenu();
}

function handleMenuClick(menu){
    alert(menu.charAt(0).toUpperCase() + menu.slice(1) + ' page - add your content here');
}

document.getElementById('searchInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        searchVideos();
    }
});

window.onload = function(){
    createThumbnails();
    document.querySelector('.logo-img').onclick = goHome;
};
</script>

</body>
</html>
