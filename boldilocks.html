<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Simple Video · Gallery</title>

<style>
/* black background, pink/white text (#ff00a8), no borders anywhere */
* {
    box-sizing: border-box;
}

body{
background:#000000;
font-family:Arial, sans-serif;
margin:0;
padding:20px;
color:#ffffff;
}

/* HOME MENU BAR - centered for PC view */
.menu-bar{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
padding:15px 0 20px 0;
margin-bottom:20px;
border-bottom:2px solid #ff00a8;
gap:40px;
}

/* Image logo - bigger for PC */
.logo-img{
height:70px;
width:auto;
cursor:pointer;
display:block;
}

/* Menu links - centered */
.menu-links{
display:flex;
flex-wrap:wrap;
gap:30px;
}

.menu-links a{
color:#ffffff;
text-decoration:none;
font-size:18px;
padding:5px 0;
transition:color 0.2s;
cursor:pointer;
white-space:nowrap;
}

/* Mobile adjustments */
@media (max-width: 768px) {
    .menu-bar {
        justify-content:space-between;
        gap:10px;
    }
    .logo-img {
        height:50px;
    }
    .menu-links a {
        font-size:14px;
        gap:12px;
    }
}

@media (max-width: 480px) {
    .menu-links {
        gap:8px;
    }
    .menu-links a {
        font-size:13px;
    }
    .logo-img {
        height:45px;
    }
}

.menu-links a:hover{
color:#ff00a8;
}

.menu-links a.active{
color:#ff00a8;
border-bottom:2px solid #ff00a8;
}

/* player section */
#player{
display:none;
margin:20px 0 30px 0;
text-align:center;
padding:20px;
background:#111111;
border-radius:8px;
width:100%;
}

#player video{
width:100%;
max-width:1000px;
background:#000000;
display:block;
margin:0 auto;
border-radius:4px;
}

/* DOWNLOAD BUTTON */
.download-btn{
display:inline-block;
margin-top:20px;
padding:15px 40px;
background:#ff00a8;
color:#ffffff;
text-decoration:none;
font-size:18px;
font-weight:bold;
border:none;
cursor:pointer;
transition:background 0.2s;
width:auto;
min-width:220px;
border-radius:4px;
-webkit-tap-highlight-color: transparent;
}

.download-btn:hover{
background:#cc0085;
}

/* Grid - larger thumbnails for PC */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
gap:25px;
justify-content:center;
max-width:1400px;
margin:0 auto;
margin-top:20px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
        gap:30px;
    }
}

@media (max-width: 480px) {
    .grid {
        grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
        gap:12px;
    }
}

.card{
width:100%;
cursor:pointer;
transition:transform 0.1s;
-webkit-tap-highlight-color: transparent;
}

.card:hover{
transform:scale(1.02);
}

.card:active{
transform:scale(0.98);
}

/* Class to hide the currently playing video's card */
.card.playing {
    display: none;
}

.thumb{
position:relative;
overflow:hidden;
border-radius:6px;
}

.thumb video{
width:100%;
height:auto;
aspect-ratio:16/9;
object-fit:cover;
display:block;
background:#000;
border-radius:6px;
}

.title{
font-size:15px;
margin-top:8px;
color:#ffffff;
text-align:center;
word-break:break-word;
padding:0 2px;
}

@media (max-width: 480px) {
    .title {
        font-size:12px;
    }
}

/* simple scrollbar */
::-webkit-scrollbar {
width:8px;
background:#111111;
}
::-webkit-scrollbar-thumb {
background:#ff00a8;
border-radius:0;
}

/* Touch optimization */
@media (max-width: 768px) {
    .download-btn {
        padding:14px 25px;
        font-size:16px;
    }
    
    .menu-links a {
        padding:8px 0;
    }
}

/* Prevent text selection */
.download-btn, .menu-links a, .card {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
</style>
</head>

<script>

// ========== YOUR 9 AD LINKS ==========
const adLinks = [
    "https://omg10.com/4/8251888",
    "https://omg10.com/4/7512585", 
    "https://omg10.com/4/8257954",
    "https://omg10.com/4/1415254", 
    "https://omg10.com/4/7512545", 
    "https://omg10.com/4/8198889",
    "https://omg10.com/4/8236017", 
    "https://omg10.com/4/8247899", 
    "https://omg10.com/4/8195375"
];

// Ad rotation counter
let adCounter = localStorage.getItem('adCounter') ? parseInt(localStorage.getItem('adCounter')) : 0;

// Function to get next ad in rotation
function getNextAdLink() {
    const adLink = adLinks[adCounter % adLinks.length];
    adCounter = (adCounter + 1) % adLinks.length;
    localStorage.setItem('adCounter', adCounter);
    return adLink;
}

// Function to open ad
function openAd() {
    const adLink = getNextAdLink();
    window.open(adLink, '_blank');
}

let currentVideoUrl = '';
let currentVideoTitle = '';
let currentDownloadLink = '';
let currentCardId = ''; // Store which card is playing

// Disable right-click on videos only
document.addEventListener('contextmenu', function(e) {
    if (e.target.tagName === 'VIDEO') {
        e.preventDefault();
        return false;
    }
});

function handleThumbnailClick(videoUrl, videoTitle, downloadLink, cardId){

    // If there was a previously playing video, show its card again
    if (currentCardId) {
        const previousCard = document.getElementById(currentCardId);
        if (previousCard) {
            previousCard.classList.remove('playing');
        }
    }

    // Save current video info
    currentVideoUrl = videoUrl;
    currentVideoTitle = videoTitle;
    currentDownloadLink = downloadLink;
    currentCardId = cardId;

    // Hide the clicked card
    const currentCard = document.getElementById(cardId);
    if (currentCard) {
        currentCard.classList.add('playing');
    }

    // Open ad
    openAd();

    // Show the player
    document.getElementById("player").style.display = "block";

    // Update player video
    let video = document.getElementById("mainVideo");
    video.src = videoUrl;
    video.play();

    // Scroll to player
    window.scrollTo({
        top:document.getElementById("player").offsetTop - 10,
        behavior:"smooth"
    });

}

// Handle download button click
function handleDownloadClick(event) {
    openAd();
    
    setTimeout(() => {
        if (currentDownloadLink) {
            window.location.href = currentDownloadLink;
        } else {
            alert('No download link available');
        }
    }, 100);
    
    return false;
}

// GO HOME FUNCTION - shows all thumbnails again
function goHome() {
    // Hide the player
    document.getElementById("player").style.display = "none";
    
    // Show all cards by removing 'playing' class from all
    document.querySelectorAll('.card').forEach(card => {
        card.classList.remove('playing');
    });
    
    // Clear current card ID
    currentCardId = '';
    
    // Stop video playback
    let video = document.getElementById("mainVideo");
    video.pause();
    video.src = '';
    
    // Scroll to top
    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

    // Update active menu
    document.querySelectorAll('.menu-links a').forEach(link => {
        link.classList.remove('active');
    });
    document.getElementById('homeLink').classList.add('active');
}

// Handle other menu clicks
function handleMenuClick(menu) {
    alert(menu.charAt(0).toUpperCase() + menu.slice(1) + ' page - add your content here');
    
    document.querySelectorAll('.menu-links a').forEach(link => {
        link.classList.remove('active');
    });
    event.target.classList.add('active');
}

// Reset video previews
document.querySelectorAll('.card video').forEach(video => {
    video.addEventListener('mouseleave', function() {
        this.pause();
        this.currentTime = 0;
    });
});

</script>
